<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="GameFlip"/>
<meta name="theme-color" content="#0d0d0d"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<title>GameFlip Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0d0d0d;--surface:#141414;--surface2:#1c1c1c;--border:#2a2a2a;--border2:#383838;--text:#e8e8e0;--muted:#5a5a52;--accent:#7fff00;--red:#ff4d4d;--amber:#ffb347;--blue:#4fc3f7;--purple:#b39ddb;--pixel:'Press Start 2P',monospace;--body:'DM Mono',monospace;--safe-bottom:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--body);overscroll-behavior:none;}
input,select,button{font-family:inherit;}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
.main{flex:1;overflow-y:auto;padding:20px 16px;padding-bottom:calc(80px + var(--safe-bottom));}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;border:none;background:transparent;cursor:pointer;color:var(--muted);gap:4px;transition:color .15s;position:relative;}
.nav-btn.active{color:var(--accent);}
.nav-icon{font-size:18px;line-height:1;}
.nav-label{font-family:var(--pixel);font-size:6px;line-height:1;}
.nav-pip{position:absolute;top:6px;right:calc(50% - 18px);background:var(--accent);color:#000;font-family:var(--pixel);font-size:6px;padding:1px 4px;border-radius:3px;}
.page-header{margin-bottom:20px;}
.page-title{font-family:var(--pixel);font-size:14px;color:var(--accent);letter-spacing:-0.5px;line-height:1.4;margin-bottom:4px;}
.page-sub{font-size:11px;color:var(--muted);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
.card-label{font-family:var(--pixel);font-size:7px;color:var(--muted);letter-spacing:.1em;margin-bottom:12px;}
.seg{display:flex;gap:6px;margin-bottom:14px;}
.seg-btn{flex:1;padding:10px 0;border-radius:8px;cursor:pointer;font-family:var(--pixel);font-size:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--muted);transition:all .15s;}
.seg-btn.active{background:var(--accent);color:#000;border-color:transparent;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;}
.field input,.field select{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-size:13px;appearance:none;outline:none;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.result-panel{background:linear-gradient(135deg,rgba(127,255,0,.04) 0%,transparent 60%);border:1px solid var(--border2);border-radius:12px;padding:18px;margin-bottom:14px;}
.r-label{font-family:var(--pixel);font-size:7px;color:var(--muted);margin-bottom:6px;}
.r-price{font-family:var(--pixel);font-size:30px;color:var(--accent);letter-spacing:-2px;line-height:1;}
.r-range{font-size:11px;color:var(--muted);margin-top:4px;}
.breakdown{margin-top:14px;}
.brow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
.brow:last-child{border-bottom:none;font-family:var(--pixel);font-size:10px;padding-top:10px;}
.brow .bl{color:var(--muted);}
.prog-track{background:var(--border);border-radius:4px;height:5px;margin:12px 0 4px;overflow:hidden;}
.prog-fill{height:5px;border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.roi-row{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);}
.ebay-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-family:var(--pixel);font-size:7px;color:var(--accent);text-decoration:none;background:rgba(127,255,0,.08);border:1px solid rgba(127,255,0,.25);border-radius:7px;padding:8px 12px;}
.warn-box{margin-top:8px;padding:8px 12px;border-radius:7px;font-size:10px;color:#c47f0a;background:rgba(255,179,71,.08);border:1px solid rgba(255,179,71,.2);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 18px;border-radius:8px;cursor:pointer;font-family:var(--pixel);font-size:8px;border:none;transition:all .15s;}
.btn-primary{background:var(--accent);color:#000;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(255,77,77,.3);}
.btn-link{background:rgba(127,255,0,.08);color:var(--accent);border:1px solid rgba(127,255,0,.25);}
.btn-sm{padding:7px 12px;font-size:7px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.badge{display:inline-block;font-family:var(--pixel);font-size:7px;padding:3px 7px;border-radius:4px;}
.badge-green{background:rgba(127,255,0,.12);color:var(--accent);border:1px solid rgba(127,255,0,.3);}
.badge-red{background:rgba(255,77,77,.12);color:var(--red);border:1px solid rgba(255,77,77,.3);}
.badge-amber{background:rgba(255,179,71,.12);color:var(--amber);border:1px solid rgba(255,179,71,.3);}
.badge-blue{background:rgba(79,195,247,.12);color:var(--blue);border:1px solid rgba(79,195,247,.3);}
.badge-purple{background:rgba(179,157,219,.12);color:var(--purple);border:1px solid rgba(179,157,219,.3);}
.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.metric{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px;}
.m-label{font-family:var(--pixel);font-size:6px;color:var(--muted);margin-bottom:6px;}
.m-val{font-family:var(--pixel);font-size:14px;letter-spacing:-0.5px;}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:9px;cursor:pointer;background:var(--surface2);border:1px solid var(--border);margin-bottom:8px;transition:all .15s;}
.check-item.checked{background:rgba(127,255,0,.06);border-color:rgba(127,255,0,.3);}
.check-box{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;transition:all .15s;}
.check-item.checked .check-box{background:var(--accent);border-color:var(--accent);color:#000;}
.repro-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:all .15s;}
.repro-toggle.off{background:var(--surface2);border:1px solid var(--border2);}
.repro-toggle.on{background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.4);}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.toast{position:fixed;bottom:calc(74px + var(--safe-bottom) + 10px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:10px 18px;display:flex;align-items:center;gap:10px;font-size:12px;opacity:0;transition:all .3s cubic-bezier(.4,0,.2,1);z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;}
</style>
</head>
<body>
<div class="app"><div class="main" id="main"></div><nav class="bottomnav" id="bottomnav"></nav></div>
<div class="toast" id="toast"><div class="toast-dot"></div><span id="toast-msg"></span></div>
<script>
const PLATFORMS=["3DS","GBA"];
const GAMES={"3DS":[{id:"xbc3d",name:"Xenoblade Chronicles 3D",buyMin:35,buyMax:55,sellLow:70,sellHigh:95},{id:"fefates",name:"Fire Emblem Fates",buyMin:30,buyMax:50,sellLow:65,sellHigh:90},{id:"feawk",name:"Fire Emblem Awakening",buyMin:20,buyMax:35,sellLow:50,sellHigh:70},{id:"mh4u",name:"Monster Hunter 4 Ultimate",buyMin:15,buyMax:25,sellLow:40,sellHigh:55},{id:"mhgen",name:"Monster Hunter Generations",buyMin:15,buyMax:25,sellLow:38,sellHigh:50},{id:"pksol",name:"Pokemon Sole / Luna",buyMin:12,buyMax:20,sellLow:30,sellHigh:45},{id:"pkxy",name:"Pokemon X / Y",buyMin:15,buyMax:25,sellLow:35,sellHigh:50},{id:"majora",name:"Majora's Mask 3D",buyMin:20,buyMax:35,sellLow:45,sellHigh:65},{id:"luigi",name:"Luigi's Mansion",buyMin:15,buyMax:25,sellLow:35,sellHigh:50},{id:"kirby",name:"Kirby: Planet Robobot",buyMin:15,buyMax:22,sellLow:35,sellHigh:48}],"GBA":[{id:"pksm",name:"Pokemon Smeraldo",buyMin:25,buyMax:45,sellLow:65,sellHigh:100},{id:"pkrf",name:"Pokemon Rosso Fuoco/Verde F.",buyMin:20,buyMax:35,sellLow:50,sellHigh:80},{id:"pkrz",name:"Pokemon Rubino/Zaffiro",buyMin:15,buyMax:30,sellLow:40,sellHigh:65},{id:"ff6",name:"Final Fantasy VI Advance",buyMin:20,buyMax:35,sellLow:55,sellHigh:80},{id:"metfus",name:"Metroid Fusion",buyMin:15,buyMax:28,sellLow:40,sellHigh:60},{id:"castle",name:"Castlevania: Aria of Sorrow",buyMin:25,buyMax:45,sellLow:60,sellHigh:90},{id:"golden",name:"Golden Sun",buyMin:15,buyMax:25,sellLow:40,sellHigh:60},{id:"mother3",name:"Mother 3 (jap.)",buyMin:20,buyMax:40,sellLow:55,sellHigh:85},{id:"mario",name:"Mario & Luigi Superstar Saga",buyMin:10,buyMax:20,sellLow:30,sellHigh:45},{id:"awars",name:"Advance Wars",buyMin:20,buyMax:35,sellLow:50,sellHigh:75}]};
const CHECKLIST=[{id:"cart",label:"Cartuccia originale (non repro)",tip:"Viti triwing = originale"},{id:"label",label:"Etichetta autentica",tip:"Originale = ruvida, repro = lucida"},{id:"save",label:"Salvataggi funzionanti",tip:"Testa il salvataggio"},{id:"screen",label:"Schermo senza difetti",tip:"Foto su sfondo bianco"},{id:"batt",label:"Batteria interna ok",tip:"Save che spariscono = batteria morta"},{id:"buttons",label:"Tutti i tasti funzionanti",tip:"Testa ogni pulsante"},{id:"photo",label:"Foto chiare ricevute",tip:"Fronte, retro, cartuccia estratta"}];
let page="calc",flips=JSON.parse(localStorage.getItem("gflip-flips")||"[]"),checks={};
let cPlatform="3DS",cGameId="xbc3d",cCond="good",cBuy=35,cShip=6,cRepro=false,pPlatform="3DS";
let deferredInstall=null;
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredInstall=e;render();});
function ebayFee(p){return p*0.165;}
function ebayUrl(n){return "https://www.ebay.it/sch/i.html?_nkw="+encodeURIComponent(n)+"&LH_Sold=1&LH_ItemCondition=3000&_sop=12";}
function saveFlips(){localStorage.setItem("gflip-flips",JSON.stringify(flips));}
function showToast(msg){const t=document.getElementById("toast");document.getElementById("toast-msg").textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2600);}
function mc(m){return m>=25?"var(--accent)":m>=10?"var(--amber)":"var(--red)";}
function rc(r){return r>=15?"var(--accent)":r>=8?"var(--amber)":"var(--red)";}
function game(){return GAMES[cPlatform].find(g=>g.id===cGameId)||GAMES[cPlatform][0];}
function sellPrice(){const g=game();let p=cCond==="mint"?g.sellHigh:cCond==="good"?Math.round((g.sellLow+g.sellHigh)/2):g.sellLow-10;return Math.max(20,p);}
function render(){document.getElementById("main").innerHTML=pages[page]();document.getElementById("bottomnav").innerHTML=renderNav();bindEvents();}
function renderNav(){const NAV=[{id:"calc",icon:"⚡",label:"Calcola"},{id:"history",icon:"📋",label:"Storico"},{id:"dashboard",icon:"📊",label:"Stats"},{id:"checklist",icon:"✅",label:"Check"},{id:"prices",icon:"💶",label:"Prezzi"}];return NAV.map(n=>`<button class="nav-btn${page===n.id?" active":""}" onclick="goTo('${n.id}')">${n.id==="history"&&flips.length>0?`<div style="position:relative;display:inline-block"><div class="nav-icon">${n.icon}</div><div class="nav-pip">${flips.length}</div></div>`:`<div class="nav-icon">${n.icon}</div>`}<div class="nav-label">${n.label}</div></button>`).join("");}
const pages={
calc(){const g=game();const sp=sellPrice();const fee=ebayFee(sp);const buy=parseFloat(cBuy)||0;const sh=parseFloat(cShip)||0;const margin=sp-fee-sh-buy;const roi=buy>0?(margin/buy*100):0;
const installBanner=deferredInstall?`<div style="background:rgba(127,255,0,.08);border:1px solid rgba(127,255,0,.3);border-radius:10px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;"><div style="font-size:24px">📲</div><div style="flex:1;font-size:12px;color:var(--accent);line-height:1.5">Installa GameFlip come app!</div><button class="btn btn-primary btn-sm" onclick="installApp()">Installa</button></div>`:"";
return `${installBanner}<div class="page-header"><div class="page-title">CALC</div><div class="page-sub">Calcola il margine prima di comprare</div></div>
<div class="card"><div class="card-label">PIATTAFORMA</div><div class="seg">${PLATFORMS.map(p=>`<button class="seg-btn${cPlatform===p?" active":""}" onclick="setPlatform('${p}')">${p}</button>`).join("")}</div>
<div class="field"><label>Titolo</label><select id="c-game" onchange="setGame(this.value)">${GAMES[cPlatform].map(g=>`<option value="${g.id}"${g.id===cGameId?" selected":""}>${g.name}</option>`).join("")}</select></div>
<div class="field"><label>Condizioni</label><select id="c-cond" onchange="setCond(this.value)">${[["mint","Mint ✨"],["good","Buono 👍"],["fair","Discreto 🔸"]].map(([v,l])=>`<option value="${v}"${v===cCond?" selected":""}>${l}</option>`).join("")}</select></div>
${cPlatform==="GBA"?`<div class="repro-toggle ${cRepro?"on":"off"}" onclick="toggleRepro()"><div class="check-box" style="${cRepro?"background:var(--red);border-color:var(--red);":""}">${cRepro?"✓":""}</div><div><div style="font-size:13px;font-weight:600;color:${cRepro?"var(--red)":"var(--text)"}">${cRepro?"⚠ Cartuccia REPRO":"Cartuccia originale"}</div><div style="font-size:10px;color:var(--muted)">Tocca se è falsa</div></div></div>`:""}</div>
<div class="card"><div class="card-label">COSTI</div><div class="grid2"><div class="field"><label>Acquisto €</label><input type="number" id="c-buy" value="${cBuy}" inputmode="decimal"/></div><div class="field"><label>Spedizione €</label><input type="number" id="c-ship" value="${cShip}" inputmode="decimal"/></div></div>
<div style="font-size:11px;color:var(--blue);background:rgba(79,195,247,.08);border:1px solid rgba(79,195,247,.2);border-radius:7px;padding:8px 10px;">Range tipico: <strong>€${g.buyMin}–€${g.buyMax}</strong></div></div>
${cRepro?`<div class="card" style="border-color:rgba(255,77,77,.4)"><div style="font-family:var(--pixel);font-size:9px;color:var(--red);margin-bottom:6px">⚠ NON RIVENDIBILE</div><div style="font-size:12px;color:#ff8080;line-height:1.6">Cartuccia falsa = valore zero.</div></div>`:
`<div class="result-panel"><div class="r-label">PREZZO CONSIGLIATO EBAY</div><div class="r-price">€${sp}</div><div class="r-range">Range: €${g.sellLow}–€${g.sellHigh}</div>
<a class="ebay-link" href="${ebayUrl(g.name)}" target="_blank">↗ Verifica venduti reali su eBay</a>
<div class="warn-box">⚠ Prezzi orientativi — verifica sempre i venduti eBay</div>
<div class="breakdown">
<div class="brow"><span class="bl">Prezzo vendita</span><span>€${sp}</span></div>
<div class="brow"><span class="bl">− Commissione eBay</span><span style="color:var(--red)">−€${Math.round(fee)}</span></div>
<div class="brow"><span class="bl">− Spedizione</span><span style="color:var(--red)">−€${sh}</span></div>
<div class="brow"><span class="bl">− Acquisto</span><span style="color:var(--red)">−€${buy}</span></div>
<div class="brow"><span class="bl">= MARGINE</span><span style="color:${mc(margin)}">${margin>=0?"+":""}€${Math.round(margin)}</span></div>
</div>
<div class="prog-track"><div class="prog-fill" style="width:${Math.min(100,Math.max(0,roi/30*100))}%;background:${rc(roi)}"></div></div>
<div class="roi-row"><span>ROI: <span style="color:${rc(roi)}">${roi.toFixed(1)}%</span></span><span>target 15%+</span></div></div>`}
<div class="btn-row"><button class="btn btn-primary" onclick="saveFlip()">💾 Salva flip</button><button class="btn btn-ghost" onclick="resetCalc()">↺ Reset</button></div>`;},
history(){return `<div class="page-header"><div class="page-title">STORICO</div><div class="page-sub">${flips.length} flip salvati</div></div>${flips.length===0?`<div class="empty"><div style="font-size:36px;margin-bottom:12px">🎮</div><div style="font-size:13px">Nessun flip ancora!</div></div>`:`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div class="card-label" style="margin-bottom:0">REGISTRO</div><button class="btn btn-danger btn-sm" onclick="clearAll()">🗑 Svuota</button></div>${flips.map(f=>`<div style="border-bottom:1px solid var(--border);padding:12px 0"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px"><div><div style="font-weight:600;font-size:13px;margin-bottom:3px">${f.game}</div><div style="display:flex;gap:6px;align-items:center"><span class="badge badge-${f.platform==="3DS"?"blue":"purple"}">${f.platform}</span><span style="font-size:10px;color:var(--muted)">${f.date}</span></div></div><div style="text-align:right"><div style="font-family:var(--pixel);font-size:12px;color:${f.margin>=0?"var(--accent)":"var(--red)}">${f.margin>=0?"+":""}€${f.margin}</div><div style="font-size:10px;color:var(--muted)">${f.roi}% ROI</div></div></div><div style="display:flex;justify-content:space-between;align-items:center"><span class="badge badge-${f.status==="venduto"?"green":"blue"}">${f.status==="venduto"?"✓ Venduto":"Pianificato"}</span><div style="display:flex;gap:6px"><button class="btn btn-ghost btn-sm" onclick="toggleStatus(${f.id})">↕</button><button class="btn btn-danger btn-sm" onclick="deleteFlip(${f.id})">✕</button></div></div></div>`).join("")}</div>`}`;},
dashboard(){const sold=flips.filter(f=>f.status==="venduto");const profit=sold.reduce((s,f)=>s+f.margin,0);const avgRoi=sold.length>0?sold.reduce((s,f)=>s+f.roi,0)/sold.length:0;const byCat=flips.reduce((a,f)=>{a[f.platform]=(a[f.platform]||0)+1;return a},{});const topGame=Object.entries(flips.reduce((a,f)=>{a[f.game]=(a[f.game]||0)+1;return a},{})).sort((a,b)=>b[1]-a[1])[0];
return `<div class="page-header"><div class="page-title">STATS</div><div class="page-sub">Le tue performance</div></div>
<div class="metric-grid"><div class="metric"><div class="m-label">FLIP TOTALI</div><div class="m-val" style="color:var(--accent)">${flips.length}</div></div><div class="metric"><div class="m-label">PROFITTO</div><div class="m-val" style="color:${profit>=0?"var(--accent)":"var(--red)"}">${profit>=0?"+":""}€${profit}</div></div><div class="metric"><div class="m-label">ROI MEDIO</div><div class="m-val" style="color:${rc(avgRoi)}">${avgRoi.toFixed(1)}%</div></div><div class="metric"><div class="m-label">TOP GIOCO</div><div class="m-val" style="color:var(--purple);font-size:9px;line-height:1.4">${topGame?topGame[0].split(" ").slice(0,3).join(" "):"—"}</div></div></div>
<div class="card"><div class="card-label">PER PIATTAFORMA</div>${flips.length===0?`<div style="font-size:13px;color:var(--muted)">Nessun dato</div>`:PLATFORMS.map(p=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px"><span class="badge badge-${p==="3DS"?"blue":"purple"}">${p}</span><span style="color:var(--muted);font-size:11px">${byCat[p]||0} flip</span></div><div class="prog-track" style="margin:0"><div class="prog-fill" style="width:${flips.length>0?((byCat[p]||0)/flips.length*100):0}%;background:${p==="3DS"?"var(--blue)":"var(--purple)"}"></div></div></div>`).join("")}</div>
<div class="card"><div class="card-label">ULTIMI FLIP</div>${flips.length===0?`<div style="font-size:13px;color:var(--muted)">Nessun flip</div>`:flips.slice(0,5).map(f=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px"><div><div style="font-weight:600">${f.game.substring(0,22)}</div><div style="font-size:10px;color:var(--muted)">${f.date}</div></div><div style="text-align:right"><div style="color:${f.margin>=0?"var(--accent)":"var(--red)"};font-weight:700">${f.margin>=0?"+":""}€${f.margin}</div><div style="font-size:10px;color:var(--muted)">${f.roi}% ROI</div></div></div>`).join("")}</div>`;},
checklist(){const done=Object.values(checks).filter(Boolean).length;return `<div class="page-header"><div class="page-title">CHECK</div><div class="page-sub">Verifica prima di pagare</div></div><div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="card-label" style="margin-bottom:0">VERIFICHE</div><div style="font-family:var(--pixel);font-size:9px;color:var(--accent)">${done}/${CHECKLIST.length}</div></div>${CHECKLIST.map(item=>`<div class="check-item${checks[item.id]?" checked":""}" onclick="toggleCheck('${item.id}')"><div class="check-box">${checks[item.id]?"✓":""}</div><div><div style="font-size:13px;font-weight:600;color:${checks[item.id]?"var(--accent)":"var(--text)"}">${item.label}</div><div style="font-size:10px;color:var(--muted)">${item.tip}</div></div></div>`).join("")}<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px"><div style="font-size:12px;color:${done===CHECKLIST.length?"var(--accent)":"var(--muted)"}">${done===CHECKLIST.length?"✓ Puoi acquistare!":`Mancano ${CHECKLIST.length-done}`}</div><button class="btn btn-ghost btn-sm" onclick="resetChecks()">↺ Reset</button></div></div>`;},
prices(){const eu=`https://www.ebay.it/sch/i.html?_nkw=giochi+${pPlatform==="GBA"?"game+boy+advance":"nintendo+3ds"}&LH_Sold=1&LH_ItemCondition=3000&_sop=12`;return `<div class="page-header"><div class="page-title">PREZZI</div><div class="page-sub">Stime — verifica sempre eBay</div></div><div class="seg">${PLATFORMS.map(p=>`<button class="seg-btn${pPlatform===p?" active":""}" onclick="setPricePlatform('${p}')">${p}</button>`).join("")}</div><a href="${eu}" target="_blank" class="btn btn-link btn-sm" style="margin-bottom:14px;display:inline-flex">↗ Tutti i venduti eBay</a><div class="card">${GAMES[pPlatform].map(g=>{const mid=Math.round((g.sellLow+g.sellHigh)/2);const est=Math.round(mid*0.835-((g.buyMin+g.buyMax)/2)-6);return`<div style="border-bottom:1px solid var(--border);padding:12px 0"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"><div style="font-weight:700;font-size:13px;flex:1;padding-right:8px">${g.name}</div><span style="font-family:var(--pixel);font-size:10px;color:${mc(est)};flex-shrink:0">${est>=0?"+":""}€${est}</span></div><div style="display:flex;gap:12px;font-size:11px;color:var(--muted);margin-bottom:8px;flex-wrap:wrap"><span>Compra: <strong style="color:var(--text)">€${g.buyMin}–${g.buyMax}</strong></span><span>Vendi: <strong style="color:var(--accent)">€${g.sellLow}–${g.sellHigh}</strong></span></div><a href="${ebayUrl(g.name)}" target="_blank" class="btn btn-link btn-sm">↗ Venduti eBay</a></div>`;}).join("")}</div><div class="warn-box">⚠ Verifica sempre i venduti eBay per i prezzi aggiornati del giorno.</div>`;}
};
function goTo(p){page=p;render();window.scrollTo(0,0);}
function setPlatform(p){cPlatform=p;cGameId=GAMES[p][0].id;cRepro=false;render();}
function setGame(v){cGameId=v;syncInputs();render();}
function setCond(v){cCond=v;syncInputs();render();}
function toggleRepro(){cRepro=!cRepro;syncInputs();render();}
function syncInputs(){const b=document.getElementById("c-buy");const s=document.getElementById("c-ship");if(b)cBuy=b.value;if(s)cShip=s.value;}
function resetCalc(){cBuy=game().buyMin;cShip=6;cCond="good";cRepro=false;render();}
function saveFlip(){syncInputs();const g=game();const sp=sellPrice();const fee=ebayFee(sp);const buy=parseFloat(cBuy)||0;const sh=parseFloat(cShip)||0;const margin=sp-fee-sh-buy;const roi=buy>0?(margin/buy*100):0;flips.unshift({id:Date.now(),date:new Date().toLocaleDateString("it-IT"),platform:cPlatform,game:g.name,buyPrice:buy,sellPrice:sp,margin:Math.round(margin),roi:parseFloat(roi.toFixed(1)),status:"pianificato"});saveFlips();showToast("Flip salvato! 🎮");render();}
function toggleStatus(id){flips=flips.map(f=>f.id===id?{...f,status:f.status==="venduto"?"pianificato":"venduto"}:f);saveFlips();render();}
function deleteFlip(id){flips=flips.filter(f=>f.id!==id);saveFlips();render();}
function clearAll(){if(confirm("Svuotare tutto?")){{flips=[];saveFlips();render();}}}
function toggleCheck(id){checks[id]=!checks[id];render();}
function resetChecks(){checks={};render();}
function setPricePlatform(p){pPlatform=p;render();}
function installApp(){if(deferredInstall){deferredInstall.prompt();deferredInstall.userChoice.then(()=>{deferredInstall=null;render();});}}
function bindEvents(){const b=document.getElementById("c-buy");const s=document.getElementById("c-ship");if(b){b.addEventListener("input",()=>{cBuy=b.value;});b.addEventListener("change",()=>{cBuy=b.value;render();});}if(s){s.addEventListener("input",()=>{cShip=s.value;});s.addEventListener("change",()=>{cShip=s.value;render();});}}
render();
</script>
</body>
</html>
